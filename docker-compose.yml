version: "3.8"

#Start services:
#docker compose up -d
#Check running containers:
#docker ps

services:
  postgres:
    image: postgres:16
    container_name: ai_support_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_support_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_support_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: